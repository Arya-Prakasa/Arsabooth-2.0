<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapBooth – K-Pop Photo Booth HD</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bungee&family=DM+Sans:wght@300;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --void:#0C0820;--booth:#16103A;--card:#1C1548;
  --neon:#FF2D78;--gold:#FFD700;--teal:#00E5CC;
  --text:#EDE8FF;--muted:#7A6FA8;--border:rgba(255,215,0,.18);
}
body{font-family:'DM Sans',sans-serif;background:var(--void);color:var(--text);min-height:100vh;display:flex;flex-direction:column;
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(255,45,120,.12),transparent),
    radial-gradient(ellipse 60% 40% at 80% 90%,rgba(0,229,204,.07),transparent);}

/* HEADER */
header{text-align:center;padding:1.5rem 1rem .8rem;}
.lights{display:flex;justify-content:center;gap:9px;margin-bottom:.9rem;}
.light{width:8px;height:8px;border-radius:50%;animation:blink 1.8s ease-in-out infinite;}
.light:nth-child(1){background:#FFD700;box-shadow:0 0 7px #FFD700;animation-delay:0s;}
.light:nth-child(2){background:#FF2D78;box-shadow:0 0 7px #FF2D78;animation-delay:.25s;}
.light:nth-child(3){background:#00E5CC;box-shadow:0 0 7px #00E5CC;animation-delay:.5s;}
.light:nth-child(4){background:#FFD700;box-shadow:0 0 7px #FFD700;animation-delay:.75s;}
.light:nth-child(5){background:#FF2D78;box-shadow:0 0 7px #FF2D78;animation-delay:1s;}
.light:nth-child(6){background:#00E5CC;box-shadow:0 0 7px #00E5CC;animation-delay:1.25s;}
.light:nth-child(7){background:#FFD700;box-shadow:0 0 7px #FFD700;animation-delay:1.5s;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.brand{font-family:'Bungee',cursive;font-size:clamp(2.6rem,6vw,4rem);color:var(--gold);
  text-shadow:0 0 28px rgba(255,215,0,.5),5px 5px 0 var(--neon);line-height:1;letter-spacing:.04em;}
.tagline{font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-top:.45rem;}

/* APP */
.app{display:grid;grid-template-columns:1fr 300px;gap:1.6rem;padding:1.2rem 2rem 2.5rem;max-width:1110px;margin:0 auto;width:100%;flex:1;}

/* CAMERA */
.cam-section{display:flex;flex-direction:column;gap:.85rem;}
.camera-frame{position:relative;background:var(--booth);border-radius:14px;overflow:hidden;aspect-ratio:3/4;
  border:2px solid var(--border);box-shadow:0 0 50px rgba(255,45,120,.1),inset 0 0 60px rgba(0,0,0,.5);}
#video{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1);transition:filter .3s;}
.f-none{filter:none;}.f-noir{filter:grayscale(1) contrast(1.15);}
.f-sepia{filter:sepia(.9) brightness(1.06);}.f-vivid{filter:saturate(1.9) contrast(1.15);}
.f-vintage{filter:sepia(.35) brightness(.95) hue-rotate(-10deg) saturate(.8);}
.f-cool{filter:hue-rotate(195deg) saturate(1.3) brightness(1.05);}
.f-warm{filter:sepia(.2) saturate(1.5) brightness(1.05) hue-rotate(10deg);}
.flash-overlay{position:absolute;inset:0;background:white;opacity:0;pointer-events:none;z-index:10;}
.flash-overlay.active{animation:flashPop .45s ease-out forwards;}
@keyframes flashPop{0%{opacity:1;}100%{opacity:0;}}
.countdown{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Bungee',cursive;font-size:9rem;color:var(--gold);
  text-shadow:0 0 40px rgba(255,215,0,.9),5px 5px 0 var(--neon);
  z-index:5;opacity:0;pointer-events:none;transition:opacity .15s,transform .15s;transform:scale(1.3);}
.countdown.show{opacity:1;transform:scale(1);}
.shot-badge{position:absolute;top:14px;left:14px;background:var(--neon);color:#fff;
  font-family:'Space Mono',monospace;font-size:.68rem;font-weight:700;padding:.3rem .75rem;
  border-radius:100px;z-index:6;opacity:0;transform:translateY(-4px);transition:opacity .25s,transform .25s;}
.shot-badge.show{opacity:1;transform:translateY(0);}
.hd-cam-badge{position:absolute;top:14px;right:14px;background:var(--teal);color:var(--void);
  font-family:'Space Mono',monospace;font-size:.62rem;font-weight:700;padding:.28rem .65rem;
  border-radius:100px;z-index:6;letter-spacing:.08em;transition:opacity .3s;}
.hd-cam-badge.off{opacity:.3;}
.corner{position:absolute;width:20px;height:20px;border-color:var(--gold);border-style:solid;opacity:.6;z-index:4;}
.corner.tl{top:12px;left:12px;border-width:2px 0 0 2px;}.corner.tr{top:12px;right:12px;border-width:2px 2px 0 0;}
.corner.bl{bottom:12px;left:12px;border-width:0 0 2px 2px;}.corner.br{bottom:12px;right:12px;border-width:0 2px 2px 0;}
.no-cam{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.9rem;font-family:'Space Mono',monospace;font-size:.8rem;color:var(--muted);text-align:center;padding:1.5rem;background:var(--booth);}
.no-cam .cam-icon{font-size:3.5rem;margin-bottom:.2rem;}
.camera-frame::after{content:'';position:absolute;inset:0;border-radius:14px;pointer-events:none;transition:box-shadow .15s;}
.camera-frame.capturing::after{box-shadow:inset 0 0 0 3px var(--neon);}

/* LABELS */
.section-label{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}

/* HD TOGGLE */
.hd-toggle{width:100%;padding:.55rem .75rem;border-radius:8px;border:1.5px solid var(--teal);
  background:rgba(0,229,204,.08);color:var(--teal);font-family:'Space Mono',monospace;font-size:.68rem;
  cursor:pointer;transition:all .2s;letter-spacing:.06em;text-transform:uppercase;
  display:flex;align-items:center;justify-content:center;gap:.45rem;}
.hd-toggle.off{border-color:var(--border);background:transparent;color:var(--muted);}
.hd-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);transition:background .2s;flex-shrink:0;}
.hd-toggle.off .hd-dot{background:var(--muted);}

/* ── STRIP VARIANTS SELECTOR ── */
.variants{display:grid;grid-template-columns:repeat(5,1fr);gap:.4rem;}
.vbtn{display:flex;flex-direction:column;align-items:center;gap:.35rem;padding:.5rem .3rem .45rem;
  border-radius:9px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .18s;}
.vbtn:hover{border-color:var(--gold);}
.vbtn.active{border-color:var(--gold);background:rgba(255,215,0,.07);}
.vbtn > .vlabel{font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);}
.vbtn.active > .vlabel{color:var(--gold);}

/* Mini strip preview inside each vbtn */
.mini-strip{width:44px;border:1.5px solid;border-radius:1px;overflow:hidden;display:flex;flex-direction:column;flex-shrink:0;}
.ms-hdr{height:10px;border-bottom:1px solid;display:flex;align-items:center;
  padding:0 3px;font-size:.28rem;font-family:'Space Mono',monospace;letter-spacing:.03em;flex-shrink:0;}
.ms-grid{display:grid;grid-template-columns:1fr 1fr;flex:1;}
.ms-grid > div{aspect-ratio:3/4;border-color:inherit;}
.ms-grid > div:nth-child(1),.ms-grid > div:nth-child(2){border-bottom:1px solid;}
.ms-grid > div:nth-child(1),.ms-grid > div:nth-child(3){border-right:1px solid;}
.ms-ftr{height:7px;border-top:1px solid;flex-shrink:0;}

/* FILTERS */
.filters{display:grid;grid-template-columns:repeat(4,1fr);gap:.38rem;}
.filter-btn{padding:.5rem .2rem;border-radius:7px;border:1.5px solid var(--border);background:var(--card);
  color:var(--muted);font-family:'Space Mono',monospace;font-size:.58rem;cursor:pointer;transition:all .18s;
  text-transform:uppercase;letter-spacing:.03em;text-align:center;}
.filter-btn:hover{border-color:var(--gold);color:var(--gold);}
.filter-btn.active{background:var(--gold);color:var(--void);border-color:var(--gold);font-weight:700;}
.swatch{display:block;width:20px;height:6px;border-radius:3px;margin:0 auto .3rem;}
.sw-none{background:linear-gradient(to right,#ff9,#99f,#f9f);}
.sw-noir{background:linear-gradient(to right,#222,#888,#fff);}
.sw-sepia{background:linear-gradient(to right,#8B6343,#C8935A,#E8C49A);}
.sw-vivid{background:linear-gradient(to right,#f00,#0f0,#00f);}
.sw-vintage{background:linear-gradient(to right,#A07843,#C8A060,#E0C890);}
.sw-cool{background:linear-gradient(to right,#004488,#0088CC,#44CCFF);}
.sw-warm{background:linear-gradient(to right,#CC4400,#FF8844,#FFD0A0);}

/* MAIN BUTTONS */
.start-btn{width:100%;padding:.95rem;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--neon) 0%,#CC0044 100%);
  color:white;font-family:'Bungee',cursive;font-size:1.2rem;letter-spacing:.1em;
  cursor:pointer;transition:all .2s;box-shadow:0 4px 22px rgba(255,45,120,.4);}
.start-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,45,120,.5);}
.start-btn:active:not(:disabled){transform:translateY(0);}
.start-btn:disabled{opacity:.45;cursor:not-allowed;}
.status{text-align:center;font-family:'Space Mono',monospace;font-size:.68rem;color:var(--muted);min-height:1.4em;letter-spacing:.04em;}
.status.active{color:var(--teal);}.status.error{color:var(--neon);}.status.enhance{color:#a78bfa;}

/* ── K-POP STRIP 2×2 ── */
.strip-section{display:flex;flex-direction:column;gap:.7rem;}
.kpop-strip{
  --strip-bg:#ffffff;--strip-border:#111111;--strip-shadow:rgba(0,0,0,.2);
  --strip-text:#111111;--strip-photo-bg:#f5f5f5;--strip-divider:#e0e0e0;
  --strip-footer:#bbbbbb;--strip-num:#cccccc;
  width:100%;background:var(--strip-bg);border:2.5px solid var(--strip-border);
  box-shadow:4px 4px 0 var(--strip-shadow);display:flex;flex-direction:column;
  transition:background .3s,border-color .3s,box-shadow .3s;
}
.strip-header{padding:8px 11px 7px;border-bottom:2px solid var(--strip-border);
  display:flex;align-items:center;gap:7px;transition:border-color .3s;}
.strip-icon-el{font-size:.85rem;color:var(--strip-text);opacity:.7;line-height:1;transition:color .3s;}
.strip-brand-el{font-family:'Bebas Neue',cursive;font-size:1.15rem;letter-spacing:.18em;
  color:var(--strip-text);flex:1;line-height:1;transition:color .3s;}

/* 2×2 grid */
.strip-grid{display:grid;grid-template-columns:1fr 1fr;}
.photo-cell{aspect-ratio:3/4;background:var(--strip-photo-bg);position:relative;overflow:hidden;transition:background .3s;}
.photo-cell:nth-child(1),.photo-cell:nth-child(2){border-bottom:1.5px solid var(--strip-divider);}
.photo-cell:nth-child(1),.photo-cell:nth-child(3){border-right:1.5px solid var(--strip-divider);}
.photo-cell img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-cell.new img{animation:revealPhoto .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes revealPhoto{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
.photo-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;font-size:.65rem;color:var(--strip-num);letter-spacing:.1em;transition:color .3s;}
.photo-cell.loading{background:linear-gradient(90deg,var(--strip-photo-bg) 25%,rgba(160,160,160,.15) 50%,var(--strip-photo-bg) 75%);
  background-size:200% 100%;animation:shimmer 1.1s infinite;}
@keyframes shimmer{from{background-position:200% center;}to{background-position:-200% center;}}

.strip-footer{padding:5px 9px;border-top:1px solid var(--strip-divider);
  display:flex;justify-content:space-between;align-items:center;transition:border-color .3s;}
.strip-footer span{font-family:'Space Mono',monospace;font-size:.32rem;color:var(--strip-footer);letter-spacing:.08em;transition:color .3s;}

/* DOWNLOAD / RESET */
.download-btn{width:100%;padding:.72rem;border:1.5px solid var(--teal);border-radius:9px;
  background:transparent;color:var(--teal);font-family:'Bungee',cursive;font-size:.82rem;letter-spacing:.08em;cursor:pointer;transition:all .2s;}
.download-btn:hover:not(:disabled){background:var(--teal);color:var(--void);box-shadow:0 4px 18px rgba(0,229,204,.3);}
.download-btn:disabled{opacity:.3;cursor:not-allowed;}
.reset-btn{width:100%;padding:.48rem;border:1.5px solid rgba(255,45,120,.25);border-radius:9px;
  background:transparent;color:var(--muted);font-family:'Space Mono',monospace;font-size:.63rem;
  text-transform:uppercase;letter-spacing:.06em;cursor:pointer;transition:all .2s;}
.reset-btn:hover{border-color:var(--neon);color:var(--neon);}
canvas{display:none;}

/* RESPONSIVE */
@media(max-width:720px){
  .app{grid-template-columns:1fr;padding:1rem;gap:1.2rem;}
  .strip-section{flex-direction:row;align-items:flex-start;gap:1rem;}
  .kpop-strip{width:210px;flex-shrink:0;}
  .strip-controls{flex:1;display:flex;flex-direction:column;gap:.6rem;justify-content:center;}
}
@media(max-width:420px){
  .kpop-strip{width:170px;}
  .filters{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>
<body>

<header>
  <div class="lights">
    <div class="light"></div><div class="light"></div><div class="light"></div>
    <div class="light"></div><div class="light"></div><div class="light"></div>
    <div class="light"></div>
  </div>
  <div class="brand">SnapBooth</div>
  <div class="tagline">✦ K-Pop Photo Booth HD ✦</div>
</header>

<main class="app">

  <!-- ── LEFT: Camera + Controls ── -->
  <div class="cam-section">

    <div class="camera-frame" id="cameraFrame">
      <video id="video" autoplay playsinline muted></video>
      <div class="flash-overlay" id="flash"></div>
      <div class="countdown" id="countdown"></div>
      <div class="shot-badge" id="shotBadge"></div>
      <div class="hd-cam-badge" id="hdCamBadge">✨ HD</div>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="no-cam" id="noCam">
        <div class="cam-icon">📷</div>
        <p>Izinkan akses kamera<br>untuk memulai sesi foto</p>
        <button class="start-btn" style="width:auto;padding:.6rem 1.5rem;font-size:.9rem;margin-top:.25rem;"
          onclick="initCamera()">Aktifkan Kamera</button>
      </div>
    </div>

    <!-- HD Quality -->
    <div>
      <div class="section-label">Kualitas</div>
      <button class="hd-toggle" id="hdToggle" onclick="toggleHD()">
        <span class="hd-dot"></span>
        <span id="hdLabel">✨ HD Enhance — ON</span>
      </button>
    </div>

    <!-- Strip Variants -->
    <div>
      <div class="section-label">Varian Strip</div>
      <div class="variants">

        <!-- Classic -->
        <button class="vbtn active" data-variant="classic" onclick="setVariant(this)">
          <div class="mini-strip" style="background:#fff;border-color:#111;">
            <div class="ms-hdr" style="background:#fff;border-color:#111;color:#111;">✦ SB</div>
            <div class="ms-grid" style="background:#e0e0e0;">
              <div style="background:#f5f5f5;border-color:#e0e0e0;"></div>
              <div style="background:#f5f5f5;border-color:#e0e0e0;"></div>
              <div style="background:#f5f5f5;border-color:#e0e0e0;"></div>
              <div style="background:#f5f5f5;border-color:#e0e0e0;"></div>
            </div>
            <div class="ms-ftr" style="background:#fff;border-color:#e0e0e0;"></div>
          </div>
          <span class="vlabel">Classic</span>
        </button>

        <!-- Dark -->
        <button class="vbtn" data-variant="dark" onclick="setVariant(this)">
          <div class="mini-strip" style="background:#0f0f0f;border-color:#eee;">
            <div class="ms-hdr" style="background:#0f0f0f;border-color:#555;color:#fff;">✦ SB</div>
            <div class="ms-grid" style="background:#2d2d2d;">
              <div style="background:#1e1e1e;border-color:#2d2d2d;"></div>
              <div style="background:#1e1e1e;border-color:#2d2d2d;"></div>
              <div style="background:#1e1e1e;border-color:#2d2d2d;"></div>
              <div style="background:#1e1e1e;border-color:#2d2d2d;"></div>
            </div>
            <div class="ms-ftr" style="background:#0f0f0f;border-color:#2d2d2d;"></div>
          </div>
          <span class="vlabel">Dark</span>
        </button>

        <!-- Blossom -->
        <button class="vbtn" data-variant="blossom" onclick="setVariant(this)">
          <div class="mini-strip" style="background:#fff5f8;border-color:#d06080;">
            <div class="ms-hdr" style="background:#fff5f8;border-color:#d06080;color:#882244;">♡ SB</div>
            <div class="ms-grid" style="background:#ffc0d8;">
              <div style="background:#ffe8f0;border-color:#ffc0d8;"></div>
              <div style="background:#ffe8f0;border-color:#ffc0d8;"></div>
              <div style="background:#ffe8f0;border-color:#ffc0d8;"></div>
              <div style="background:#ffe8f0;border-color:#ffc0d8;"></div>
            </div>
            <div class="ms-ftr" style="background:#fff5f8;border-color:#ffc0d8;"></div>
          </div>
          <span class="vlabel">Blossom</span>
        </button>

        <!-- Retro -->
        <button class="vbtn" data-variant="retro" onclick="setVariant(this)">
          <div class="mini-strip" style="background:#fdf6e3;border-color:#8b6343;">
            <div class="ms-hdr" style="background:#fdf6e3;border-color:#8b6343;color:#6b4226;">◈ SB</div>
            <div class="ms-grid" style="background:#d4b896;">
              <div style="background:#f5ead0;border-color:#d4b896;"></div>
              <div style="background:#f5ead0;border-color:#d4b896;"></div>
              <div style="background:#f5ead0;border-color:#d4b896;"></div>
              <div style="background:#f5ead0;border-color:#d4b896;"></div>
            </div>
            <div class="ms-ftr" style="background:#fdf6e3;border-color:#d4b896;"></div>
          </div>
          <span class="vlabel">Retro</span>
        </button>

        <!-- Neon -->
        <button class="vbtn" data-variant="neon" onclick="setVariant(this)">
          <div class="mini-strip" style="background:#110822;border-color:#FF2D78;">
            <div class="ms-hdr" style="background:#110822;border-color:#FF2D78;color:#FFD700;">★ SB</div>
            <div class="ms-grid" style="background:#3d0f2a;">
              <div style="background:#1e0836;border-color:#3d0f2a;"></div>
              <div style="background:#1e0836;border-color:#3d0f2a;"></div>
              <div style="background:#1e0836;border-color:#3d0f2a;"></div>
              <div style="background:#1e0836;border-color:#3d0f2a;"></div>
            </div>
            <div class="ms-ftr" style="background:#110822;border-color:#3d0f2a;"></div>
          </div>
          <span class="vlabel">Neon</span>
        </button>

      </div>
    </div>

    <!-- Filters -->
    <div>
      <div class="section-label">Filter</div>
      <div class="filters">
        <button class="filter-btn active" data-filter="f-none"    onclick="setFilter(this)"><span class="swatch sw-none"></span>Normal</button>
        <button class="filter-btn"        data-filter="f-noir"    onclick="setFilter(this)"><span class="swatch sw-noir"></span>Noir</button>
        <button class="filter-btn"        data-filter="f-sepia"   onclick="setFilter(this)"><span class="swatch sw-sepia"></span>Sepia</button>
        <button class="filter-btn"        data-filter="f-vivid"   onclick="setFilter(this)"><span class="swatch sw-vivid"></span>Vivid</button>
        <button class="filter-btn"        data-filter="f-vintage" onclick="setFilter(this)"><span class="swatch sw-vintage"></span>Vintage</button>
        <button class="filter-btn"        data-filter="f-cool"    onclick="setFilter(this)"><span class="swatch sw-cool"></span>Cool</button>
        <button class="filter-btn"        data-filter="f-warm"    onclick="setFilter(this)"><span class="swatch sw-warm"></span>Warm</button>
      </div>
    </div>

    <div class="status" id="status">Mengaktifkan kamera…</div>
    <button class="start-btn" id="startBtn" onclick="startSession()" disabled>📸 &nbsp;Ambil 4 Foto</button>
  </div>

  <!-- ── RIGHT: Strip Preview ── -->
  <div class="strip-section">
    <div class="kpop-strip" id="kpopStrip">
      <div class="strip-header">
        <span class="strip-icon-el" id="stripIconEl">✦</span>
        <span class="strip-brand-el">SNAPBOOTH</span>
      </div>
      <div class="strip-grid">
        <div class="photo-cell" id="slot0"><div class="photo-num">01</div></div>
        <div class="photo-cell" id="slot1"><div class="photo-num">02</div></div>
        <div class="photo-cell" id="slot2"><div class="photo-num">03</div></div>
        <div class="photo-cell" id="slot3"><div class="photo-num">04</div></div>
      </div>
      <div class="strip-footer">
        <span>snapbooth</span>
        <span id="stripDateEl">──</span>
      </div>
    </div>
    <div class="strip-controls">
      <button class="download-btn" id="downloadBtn" onclick="downloadStrip()" disabled>⬇ &nbsp;Simpan Strip</button>
      <button class="reset-btn"    id="resetBtn"    onclick="resetSession()">↺ &nbsp;Ulang Sesi</button>
    </div>
  </div>

</main>
<canvas id="canvas"></canvas>

<script>
/* ── STATE ── */
const video       = document.getElementById('video');
const flash       = document.getElementById('flash');
const countdownEl = document.getElementById('countdown');
const shotBadge   = document.getElementById('shotBadge');
const startBtn    = document.getElementById('startBtn');
const downloadBtn = document.getElementById('downloadBtn');
const statusEl    = document.getElementById('status');
const noCam       = document.getElementById('noCam');
const cameraFrame = document.getElementById('cameraFrame');

let currentFilter  = 'f-none';
let currentVariant = 'classic';
let capturedPhotos = [];
let isRunning      = false;
let stream         = null;
let hdEnhance      = true;

/* ── VARIANT CONFIGS ── */
const VARIANTS = {
  classic: { icon:'✦', bg:'#ffffff', border:'#111111', shadow:'rgba(0,0,0,.2)',
    text:'#111111', photoBg:'#f5f5f5', divider:'#e0e0e0', footer:'#bbbbbb', num:'#cccccc', canvasBg:'#0a0a0a' },
  dark: { icon:'✦', bg:'#0f0f0f', border:'#eeeeee', shadow:'rgba(255,255,255,.07)',
    text:'#ffffff', photoBg:'#1e1e1e', divider:'#2d2d2d', footer:'#555555', num:'#383838', canvasBg:'#050505' },
  blossom: { icon:'♡', bg:'#fff5f8', border:'#d06080', shadow:'rgba(208,96,128,.22)',
    text:'#882244', photoBg:'#ffe8f0', divider:'#ffc0d8', footer:'#cc8090', num:'#ffb0c8', canvasBg:'#1a0a10' },
  retro: { icon:'◈', bg:'#fdf6e3', border:'#8b6343', shadow:'rgba(139,99,67,.2)',
    text:'#6b4226', photoBg:'#f5ead0', divider:'#d4b896', footer:'#9d7448', num:'#c4a07a', canvasBg:'#1a0e05' },
  neon: { icon:'★', bg:'#110822', border:'#FF2D78', shadow:'rgba(255,45,120,.35)',
    text:'#FFD700', photoBg:'#1e0836', divider:'#3d0f2a', footer:'#7a2050', num:'#4a1030', canvasBg:'#0a0010' },
};

/* ── APPLY VARIANT ── */
function applyVariant(v) {
  const t = VARIANTS[v], s = document.getElementById('kpopStrip');
  [['--strip-bg',t.bg],['--strip-border',t.border],['--strip-shadow',t.shadow],
   ['--strip-text',t.text],['--strip-photo-bg',t.photoBg],['--strip-divider',t.divider],
   ['--strip-footer',t.footer],['--strip-num',t.num]]
  .forEach(([p,val]) => s.style.setProperty(p,val));
  document.getElementById('stripIconEl').textContent = t.icon;
}

/* ── CAMERA ── */
async function initCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ width:{ideal:1920,max:4096}, height:{ideal:1080,max:2160}, facingMode:'user', frameRate:{ideal:30} },
      audio:false,
    });
    video.srcObject = stream;
    noCam.style.display = 'none';
    video.style.display = 'block';
    startBtn.disabled = false;
    video.onloadedmetadata = () =>
      setStatus(`Kamera ${video.videoWidth}×${video.videoHeight} siap — pilih varian & foto!`, 'active');
  } catch(err) {
    noCam.innerHTML = `<div class="cam-icon">⚠️</div><p>Akses kamera ditolak.<br><small style="opacity:.6;">${err.message}</small></p>
      <button class="start-btn" style="width:auto;padding:.6rem 1.4rem;font-size:.9rem;margin-top:.2rem;" onclick="initCamera()">Coba Lagi</button>`;
    setStatus('Akses kamera ditolak.', 'error');
  }
}

/* ── FILTER ── */
function setFilter(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  video.className = currentFilter;
  video.style.transform = 'scaleX(-1)';
}

/* ── VARIANT ── */
function setVariant(btn) {
  document.querySelectorAll('.vbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentVariant = btn.dataset.variant;
  applyVariant(currentVariant);
}

/* ── HD TOGGLE ── */
function toggleHD() {
  hdEnhance = !hdEnhance;
  document.getElementById('hdToggle').classList.toggle('off', !hdEnhance);
  document.getElementById('hdLabel').textContent = hdEnhance ? '✨ HD Enhance — ON' : '✨ HD Enhance — OFF';
  document.getElementById('hdCamBadge').classList.toggle('off', !hdEnhance);
}

/* ── HELPERS ── */
const sleep = ms => new Promise(r => setTimeout(r, ms));
const pad   = n  => String(n).padStart(2, '0');
function setStatus(msg, cls='') { statusEl.textContent=msg; statusEl.className='status'+(cls?' '+cls:''); }

async function showCountdown(num) {
  countdownEl.textContent = num===0 ? '📸' : num;
  countdownEl.classList.add('show');
  await sleep(820);
  countdownEl.classList.remove('show');
  await sleep(130);
}
function doFlash() { flash.classList.remove('active'); void flash.offsetWidth; flash.classList.add('active'); }
function setSlotLoading(i) { const s=document.getElementById('slot'+i); s.innerHTML=''; s.classList.add('loading'); }
function fillSlot(i, url) {
  const s = document.getElementById('slot'+i);
  s.classList.remove('loading'); s.classList.add('new');
  const img = new Image();
  img.onload = () => { s.innerHTML=''; s.appendChild(img); };
  img.src = url;
}

/* ── HD PIPELINE ── */
const FILTER_MAP = {
  'f-none':'none', 'f-noir':'grayscale(1) contrast(1.15)',
  'f-sepia':'sepia(.9) brightness(1.06)', 'f-vivid':'saturate(1.9) contrast(1.15)',
  'f-vintage':'sepia(.35) brightness(.95) hue-rotate(-10deg) saturate(.8)',
  'f-cool':'hue-rotate(195deg) saturate(1.3) brightness(1.05)',
  'f-warm':'sepia(.2) saturate(1.5) brightness(1.05) hue-rotate(10deg)',
};

function autoBrighten(src) {
  /* Sample at 80×60 thumbnail for speed */
  const th=document.createElement('canvas'); th.width=80; th.height=60;
  const tc=th.getContext('2d'); tc.drawImage(src,0,0,80,60);
  const td=tc.getImageData(0,0,80,60).data;
  let lum=0; for(let i=0;i<td.length;i+=4) lum+=.299*td[i]+.587*td[i+1]+.114*td[i+2];
  const avg=lum/(td.length/4);
  let b=1;
  if(avg<40)b=Math.min(2.8,135/avg); else if(avg<80)b=Math.min(2.0,135/avg);
  else if(avg<110)b=Math.min(1.5,135/avg); else if(avg<125)b=Math.min(1.2,135/avg);
  const sat = currentFilter==='f-noir' ? '1.0' : '1.35';
  const out=document.createElement('canvas'); out.width=src.width; out.height=src.height;
  const oc=out.getContext('2d');
  oc.filter=`brightness(${b.toFixed(3)}) contrast(1.22) saturate(${sat})`;
  oc.drawImage(src,0,0); oc.filter='none';
  return out;
}

function unsharpMask(canvas, amount=0.7, blur=1.5) {
  const W=canvas.width, H=canvas.height;
  const bl=document.createElement('canvas'); bl.width=W; bl.height=H;
  const bc=bl.getContext('2d'); bc.filter=`blur(${blur}px)`; bc.drawImage(canvas,0,0); bc.filter='none';
  const sc=canvas.getContext('2d');
  const op=sc.getImageData(0,0,W,H), bp=bc.getImageData(0,0,W,H);
  const o=op.data, b=bp.data;
  for(let i=0;i<o.length;i+=4){
    o[i]  =Math.min(255,Math.max(0,o[i]  +amount*(o[i]  -b[i])));
    o[i+1]=Math.min(255,Math.max(0,o[i+1]+amount*(o[i+1]-b[i+1])));
    o[i+2]=Math.min(255,Math.max(0,o[i+2]+amount*(o[i+2]-b[i+2])));
  }
  sc.putImageData(op,0,0);
  return canvas;
}

async function enhanceHD(canvas) {
  const out = autoBrighten(canvas);
  if((out.width*out.height)/1e6 <= 3) unsharpMask(out, 0.7, 1.5);
  return out;
}

/* ── GRAB FRAME ── */
async function grabFrame() {
  const W=video.videoWidth||640, H=video.videoHeight||480;
  const c=document.createElement('canvas'); c.width=W; c.height=H;
  const cx=c.getContext('2d');
  cx.translate(W,0); cx.scale(-1,1);
  cx.filter=FILTER_MAP[currentFilter]||'none';
  cx.drawImage(video,0,0,W,H);
  cx.filter='none'; cx.setTransform(1,0,0,1,0,0);
  if(hdEnhance){ const e=await enhanceHD(c); return e.toDataURL('image/png',.97); }
  return c.toDataURL('image/png',.92);
}

/* ── SESSION ── */
async function startSession() {
  if(isRunning||!stream) return;
  isRunning=true; capturedPhotos=[];
  startBtn.disabled=true; downloadBtn.disabled=true;
  document.querySelectorAll('.filter-btn,.vbtn').forEach(b=>b.style.pointerEvents='none');

  for(let i=0;i<4;i++){
    const s=document.getElementById('slot'+i); s.className='photo-cell';
    s.innerHTML=`<div class="photo-num">0${i+1}</div>`;
  }
  document.getElementById('stripDateEl').textContent='──';

  for(let i=0;i<4;i++){
    shotBadge.textContent=`FOTO ${i+1}/4`; shotBadge.classList.add('show');
    cameraFrame.classList.add('capturing');
    setStatus(`Bersiap untuk foto ${i+1} dari 4…`,'active');
    await showCountdown(3); await showCountdown(2); await showCountdown(1); await showCountdown(0);
    doFlash(); setSlotLoading(i);
    if(hdEnhance) setStatus('✨ HD Enhance sedang diproses…','enhance');
    const url=await grabFrame(); capturedPhotos.push(url);
    shotBadge.classList.remove('show'); cameraFrame.classList.remove('capturing');
    await sleep(60); fillSlot(i,url);
    setStatus(`✓ Foto ${i+1}${hdEnhance?' (HD)':''} diambil!`,'active');
    if(i<3) await sleep(1300);
  }

  const now=new Date();
  document.getElementById('stripDateEl').textContent=
    `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())}`;
  setStatus('🎉 Selesai! Strip 2×2 siap disimpan.','active');
  startBtn.disabled=false; downloadBtn.disabled=false;
  document.querySelectorAll('.filter-btn,.vbtn').forEach(b=>b.style.pointerEvents='');
  isRunning=false;
}

/* ── DOWNLOAD – DOUBLE 2×2 STRIP ── */
async function downloadStrip() {
  if(capturedPhotos.length<4) return;
  const v    = VARIANTS[currentVariant];
  const now  = new Date();
  const date = `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())}`;

  /* Canvas geometry */
  const SW   = 1200;                    // single strip width
  const PW   = SW / 2;                 // each photo width  (2 cols)
  const PH   = Math.round(PW * 3/4);  // each photo height (4:3)
  const DIV  = 2;                      // cross-divider thickness
  const GRIDH= PH*2 + DIV;            // grid total height
  const HH   = 56;                     // header height
  const FH   = 28;                     // footer height
  const SH   = HH + GRIDH + FH;       // strip total height

  const PAD=20;
  const TW=PAD*2+SW, TH=PAD*2+SH;

  const sc=document.createElement('canvas'); sc.width=TW; sc.height=TH;
  const sctx=sc.getContext('2d');
  sctx.imageSmoothingEnabled = true;
  sctx.imageSmoothingQuality = "high";
  sctx.fillStyle=v.canvasBg; sctx.fillRect(0,0,TW,TH);

  const drawStrip = async (ox) => {
    /* Background */
    sctx.fillStyle=v.bg; sctx.fillRect(ox,PAD,SW,SH);
    /* Border */
    sctx.strokeStyle=v.border; sctx.lineWidth=2.5;
    sctx.strokeRect(ox+1.25,PAD+1.25,SW-2.5,SH-2.5);
    /* Header text */
    sctx.fillStyle=v.text;
    sctx.font='bold 22px "Arial Black",Arial,sans-serif';
    sctx.textAlign='left';
    sctx.fillText(v.icon+'  SNAPBOOTH', ox+13, PAD+38);
    /* Header divider */
    sctx.strokeStyle=v.border; sctx.lineWidth=2;
    sctx.beginPath(); sctx.moveTo(ox+1,PAD+HH); sctx.lineTo(ox+SW-1,PAD+HH); sctx.stroke();
    /* ── 2×2 Photos ── */
    for(let r=0;r<2;r++){
      for(let c=0;c<2;c++){
        const idx=r*2+c;
        const px=ox+c*PW, py=PAD+HH+r*(PH+DIV);
        if(capturedPhotos[idx]){
          await loadImg(sctx,capturedPhotos[idx],px,py,PW,PH);
        } else {
          sctx.fillStyle=v.photoBg; sctx.fillRect(px,py,PW,PH);
          sctx.fillStyle=v.num; sctx.font='14px "Courier New",monospace'; sctx.textAlign='center';
          sctx.fillText('0'+(idx+1),px+PW/2,py+PH/2+5);
        }
      }
    }
    /* Cross dividers */
    sctx.strokeStyle=v.divider; sctx.lineWidth=DIV;
    sctx.beginPath(); sctx.moveTo(ox,PAD+HH+PH+DIV/2); sctx.lineTo(ox+SW,PAD+HH+PH+DIV/2); sctx.stroke(); // horizontal
    sctx.beginPath(); sctx.moveTo(ox+PW,PAD+HH); sctx.lineTo(ox+PW,PAD+HH+GRIDH); sctx.stroke();           // vertical
    /* Footer */
    const fy=PAD+HH+GRIDH;
    sctx.strokeStyle=v.divider; sctx.lineWidth=.6;
    sctx.beginPath(); sctx.moveTo(ox+1,fy); sctx.lineTo(ox+SW-1,fy); sctx.stroke();
    sctx.fillStyle=v.footer; sctx.font='8px "Courier New",monospace';
    sctx.textAlign='left';  sctx.fillText('snapbooth',ox+10,fy+19);
    sctx.textAlign='right'; sctx.fillText(date,ox+SW-8,fy+19);
  };

  setStatus('⏳ Menyiapkan download…','enhance');
  await drawStrip(PAD);
  

  const link=document.createElement('a');
  link.download=`snapbooth-${Date.now()}.png`;
  link.href=sc.toDataURL('image/png');
  link.click();
  setStatus('✓ Strip berhasil disimpan!','active');
}


function loadImg(ctx,src,x,y,w,h){
  return new Promise(res=>{const img=new Image();img.onload=()=>{ctx.drawImage(img,x,y,w,h);res();};img.onerror=res;img.src=src;});
}
/* ── RESET ── */
function resetSession() {
  capturedPhotos=[];
  for(let i=0;i<4;i++){
    const s=document.getElementById('slot'+i); s.className='photo-cell';
    s.innerHTML=`<div class="photo-num">0${i+1}</div>`;
  }
  document.getElementById('stripDateEl').textContent='──';
  downloadBtn.disabled=true;
  if(stream) setStatus('Kamera siap — pilih varian & filter, lalu foto!','active');
}
function drawCover(ctx, img, x, y, w, h){

    const scale = Math.max(
        w / img.width,
        h / img.height
    );

    const nw = img.width * scale;
    const nh = img.height * scale;

    const nx = x + (w - nw)/2;
    const ny = y + (h - nh)/2;

    drawCover(ctx,img,x,y,w,h);

}
/* ── BOOT ── */
video.style.display='none';
initCamera();
</script>
